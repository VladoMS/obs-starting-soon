<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Vlado_MS — KAIYO//SHARD Overlay</title>
    <!--
      ============================================================
        OBS BROWSER SOURCE — KAIYO//SHARD STARTING SOON OVERLAY
      ============================================================
      Designed for OBS browser source at 1920x1080.

      Query parameters:
        ?q=BE%20RIGHT%20BACK   override headline (auto-shrinks)
        ?bg=15                 background rotation seconds (default 10)
        ?nofx=1                disable scanlines + grain (cleaner look)
        ?volume=0.5            override default volume (0..1)
        ?nointro=1             skip the entrance animation
        ?theme=ID              choose a preset (default "vladoms"):
                               vladoms → VLADO.OS "Eve" operator HUD over the rotating
                                         game backgrounds + shuffled playlist. Auto-connects
                                         to OBS WebSocket (ws://localhost:4455) and fills the
                                         broadcast panel with live SIGNAL/BITRATE/UPTIME/FPS/
                                         CPU/DROP. Opt out ?obs=0; ?obsport=NNNN; ?obspw=SECRET.
                               kaiyo   → original KAIYO//SHARD synthwave HUD over the muted
                                         looping themes/kaiyo/ disco video + single KISSA track.
                               wwm     → Eve HUD recolored to wuxia jade/gold over the looping
                                         themes/wwm/ "Where Winds Meet" video (song from file).
                               (Replaces the old ?style / ?version params.)

      Content lives in:
        playlist.json          songs (sequential, shuffled, looped)
        backgrounds.json       game-themed backgrounds (13 entries)
        assets/backgrounds/    drop your own .jpg/.png per entry id
        assets/songs/          drop song files here

      OBS setup:
        - Add Browser Source → Local file → this index.html
        - Width 1920, Height 1080
        - Tick "Control audio via OBS"
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- ?style=v2 ("VLADO.OS / Eve" operator skin) fonts. Loaded always but only used by the v2 reskin. -->
    <link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Shared base CSS for every theme (structural overlay layers + headline). -->
    <link rel="stylesheet" href="core.css">
    <!-- Theme bootstrap: apply the theme's <html> classes AND load its own CSS file(s)
         before paint, so there's no flash of the wrong skin and the HTML stays light
         (only the active theme's CSS is fetched). Each theme's chrome CSS lives in its
          own folder: themes/<id>/theme.css. Keep __cfg in sync with the THEMES object in
          the main script below. -->
    <script>try{
      var __t=(new URLSearchParams(location.search).get("theme")||"vladoms").toLowerCase();
      var __cfg={
        vladoms:{cls:["hud-eve"],               css:["themes/vladoms/theme.css"],               hud:"themes/vladoms/hud.html", js:["themes/vladoms/theme.js"]},
        kaiyo:  {cls:[],                         css:["themes/kaiyo/theme.css"],                 hud:"themes/kaiyo/hud.html",   js:["themes/kaiyo/theme.js"]},
        wwm:    {cls:["theme-wwm"],              css:["themes/wwm/theme.css"],                   hud:"themes/wwm/hud.html"}
      };
      var __c=__cfg[__t]||__cfg.vladoms;
      __c.cls.forEach(function(k){document.documentElement.classList.add(k);});
      __c.css.forEach(function(href){
        var l=document.createElement("link"); l.rel="stylesheet"; l.href=href;
        document.head.appendChild(l);
      });
    }catch(e){}</script>
    <script src="gsap.min.js"></script>
  </head>
  <body>
    <div id="root" data-composition-id="main">
      <!-- crossorigin intentionally NOT set: needed so file:// audio isn't CORS-tainted for the AnalyserNode. -->
      <audio id="track" preload="auto"></audio>

      <div id="bg-stack">
        <div class="bg-layer" id="bg-A"></div>
        <div class="bg-layer" id="bg-B"></div>
        <!-- version-2 only: muted looping background video (set up in loadBackgrounds) -->
        <video class="bg-video" id="bg-video" muted loop playsinline preload="auto"></video>
      </div>
      <div class="bg-tint"></div>
      <div class="bloom-cyan"    id="bloom-cyan"></div>
      <div class="bloom-magenta" id="bloom-magenta"></div>
      <div class="scanlines"  id="scanlines"></div>
      <div class="grain"      id="grain"></div>

      <!-- Theme HUD loaded dynamically via htmx from themes/<id>/hud.html -->
      <div id="theme-hud"></div>

      <!-- Hidden now-playing (source of truth shared across all themes) -->
      <div id="now-playing" style="display:none">STANDBY</div>

      <div class="center-col">
        <div class="headline-wrap" id="headline-wrap">
          <div class="headline" id="headline"></div>
          <div class="headline-slice" id="headline-slice" aria-hidden="true"></div>
        </div>
      </div>

      <div id="blackout" class="blackout"></div>
    </div>

    <!-- htmx: load theme HUD HTML fragment into #theme-hud -->
    <script>(function(){var c=window.__cfg&&window.__cfg[window.__t];if(c&&c.hud){var e=document.getElementById('theme-hud');e.setAttribute('hx-get',c.hud);e.setAttribute('hx-trigger','load');e.setAttribute('hx-swap','innerHTML');}})();</script>
    <script src="htmx.min.js"></script>
    <script>document.addEventListener('htmx:afterSwap',function(e){if(e.detail.target.id!=='theme-hud')return;var c=window.__cfg&&window.__cfg[window.__t];if(c&&c.js){c.js.forEach(function(u){var s=document.createElement('script');s.src=u;document.body.appendChild(s);});}});</script>

    <script>
      // ============================================================
      // Config + query params
      // ============================================================
      const params = new URLSearchParams(location.search);
      // Absent ?q -> default headline. Present-but-empty ?q (e.g. "?q=") -> keep it
      // empty (no headline), rather than falling back to the default.
      const Q_PARAM        = params.get("q");
      const HEADLINE_TEXT  = (Q_PARAM == null ? "STARTING SOON" : Q_PARAM).toUpperCase();
      const BG_ROTATION_MS = (parseFloat(params.get("bg")) || 10) * 1000;
      const NO_FX          = params.get("nofx") === "1";
      const NO_INTRO       = params.get("nointro") !== "0";
      const VOLUME_OVERRIDE= params.get("volume") != null ? parseFloat(params.get("volume")) : null;

      // ============================================================
      // THEMES — the overlay's three presets (replaces the old ?style/?version).
      // Pick with ?theme=vladoms|kaiyo|wwm (default vladoms). Each theme decides:
      //   hud      "eve" (VLADO.OS operator HUD) | "synthwave" (KAIYO//SHARD HUD)
      //   rgbLine  accent for the JS-drawn grid/icosahedron (synthwave) "r, g, b"
      //   bg.mode  "rotating"    → backgrounds.json crossfade + playlist.json
      //            "video-muted" → looping muted bg video + a single looped track
      //            "video-audio" → looping unmuted bg video; song plays from the file
      //   track    single looped {artist,title,src} (video-muted themes)
      //   nowPlaying  pinned now-playing label (video-audio themes)
      // The matching <html> classes (hud-eve / accent-jade) are applied by the head
      // script; keep that map in sync with this object. Per-theme assets live under
      // themes/<id>/; the shared game backgrounds + songs stay in assets/.
      // ============================================================
      const THEMES = {
        vladoms: {
          hud: "eve", rgbLine: "255, 59, 31",
          bg: { mode: "rotating" },
        },
        kaiyo: {
          hud: "synthwave", rgbLine: "255, 43, 214",
          bg: {
            mode: "video-muted",
            video: "themes/kaiyo/disco-16-echoes-first-light-loop-v3.mp4",
            plate: "themes/kaiyo/disco-16-echoes-first-light.png",
          },
          track: { artist: "KISSA", title: "SUNS", src: "themes/kaiyo/KISSA__SUNS.mp3" },
        },
        wwm: {
          hud: "eve", rgbLine: "54, 211, 154",
          bg: { mode: "video-audio", video: "themes/wwm/where-winds-meet.mp4" },
          nowPlaying: "Where Winds Meet",
        },
      };
      const THEME_ID = THEMES[(params.get("theme") || "").toLowerCase()] ? params.get("theme").toLowerCase() : "vladoms";
      const THEME    = THEMES[THEME_ID];

      // ============================================================
      // OVERLAY bridge — shared engine API exposed to theme JS files.
      // ============================================================
      const OVERLAY = {
        params, HEADLINE_TEXT, THEME, THEME_ID,
        nowPlaying: "STANDBY",
        trackIdx: 0, trackCount: 0,
        audio: { freqData: null },
        _tick: [], _intro: [],
        onTick(cb) { OVERLAY._tick.push(cb); },
        onIntro(cb) { OVERLAY._intro.push(cb); },
      };
      window.OVERLAY = OVERLAY;

      // HEAD-probe a same-origin asset so we can decide whether the V2 files exist
      // before committing to version-2 mode (else fall through to the normal flow).
      async function fileExists(url) {
        try {
          const r = await fetch(url, { method: "HEAD", cache: "no-store" });
          return r.ok;
        } catch (e) {
          return false;
        }
      }

      // ============================================================
      // Build headline characters (per-letter for staggered intro)
      // ============================================================
      (function buildHeadline() {
        const target = document.getElementById("headline");
        const slice  = document.getElementById("headline-slice");
        slice.textContent = HEADLINE_TEXT;
        for (const ch of HEADLINE_TEXT) {
          const span = document.createElement("span");
          span.className = "ch";
          if (ch === " ") {
            span.classList.add("gap-space");
            span.innerHTML = "&nbsp;";
          } else {
            span.textContent = ch;
          }
          target.appendChild(span);
        }
        const fit = () => {
          let size = 96;
          while (target.scrollWidth > 1380 && size > 48) {
            size -= 4;
            target.style.fontSize = size + "px";
            slice.style.fontSize = size + "px";
          }
        };
        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(fit).catch(fit);
        } else {
          setTimeout(fit, 200);
        }
      })();

      // ============================================================
      // Cache audio-reactive elements (updated per frame in tick()).
      // ============================================================
      const HEADLINE_EL = document.getElementById("headline");
      const SLICE_EL    = document.getElementById("headline-slice");

      // ============================================================
      // Intro animation (one-shot — runs once on load)
      // Shared layers only. Theme-specific HUD fades are registered
      // via OVERLAY.onIntro() and applied in finalizeIntro() below.
      // ============================================================
      const introTl = gsap.timeline({ paused: NO_INTRO });
      introTl.to("#blackout",  { opacity: 0, duration: 1.6, ease: "power2.inOut" }, 0);
      introTl.to("#bg-A", { opacity: 1, duration: 2.0, ease: "sine.out" }, 0);
      if (!NO_FX) {
        introTl.to("#scanlines",  { opacity: 0.6,  duration: 1.6, ease: "sine.out" }, 0.4);
        introTl.to("#grain",      { opacity: 0.08, duration: 2.0, ease: "sine.out" }, 0.4);
      }
      const headlineEls = document.querySelectorAll("#headline .ch");
      const introHeadAt = 2.4;
      const stagger = Math.min(0.04, 1.4 / Math.max(1, headlineEls.length));
      headlineEls.forEach((el, i) => {
        introTl.to(el, { y: 0, opacity: 1, duration: 1.0, ease: "expo.out" }, introHeadAt + i * stagger);
      });
      let _introDone = false;
      function finalizeIntro() {
        if (_introDone) return;
        _introDone = true;
        if (NO_INTRO) {
          gsap.set("#blackout", { opacity: 0 });
          gsap.set("#bg-A", { opacity: 1 });
          if (!NO_FX) { gsap.set("#scanlines", { opacity: 0.6 }); gsap.set("#grain", { opacity: 0.08 }); }
          gsap.set("#headline .ch", { y: 0, opacity: 1 });
          for (let i = 0; i < OVERLAY._intro.length; i++) OVERLAY._intro[i](null, true);
        } else {
          for (let i = 0; i < OVERLAY._intro.length; i++) OVERLAY._intro[i](introTl, false);
          introTl.play();
        }
      }
      // Give theme JS time to register via htmx, then finalize.
      setTimeout(finalizeIntro, 800);

      // ============================================================
      // Background rotator (A/B layer crossfade)
      // ============================================================
      const bgA = document.getElementById("bg-A");
      const bgB = document.getElementById("bg-B");
      let bgFront = bgA, bgBack = bgB;
      let bgIndex = 0;
      let bgList = [];

      // Scales the alpha channel of an rgba(...) string so per-entry tints (whose
      // alphas in backgrounds.json sit around 0.45–0.55) don't drown the bg image.
      // Hue stays intact so each game keeps its color identity, just muted.
      const TINT_ALPHA_SCALE = 0.4;
      function scaleRgbaAlpha(rgba, scale) {
        return rgba.replace(/rgba?\(([^)]+)\)/i, (_m, inner) => {
          const parts = inner.split(",").map(s => s.trim());
          if (parts.length !== 4) return _m;
          const a = Math.max(0, Math.min(1, parseFloat(parts[3]) * scale));
          return `rgba(${parts[0]},${parts[1]},${parts[2]},${a.toFixed(3)})`;
        });
      }

      function applyBgVisuals(layer, entry) {
        const setPlaceholder = () => {
          if (entry.placeholder) {
            layer.style.background = entry.placeholder;
            layer.style.backgroundColor = "#04060e";
            layer.style.backgroundSize = "cover";
            layer.style.backgroundPosition = "center";
            layer.style.backgroundRepeat = "no-repeat";
          } else {
            layer.style.background = "#04060e";
          }
        };
        if (entry.src) {
          const img = new Image();
          img.onload = () => {
            const tintRaw = entry.tint || ["rgba(4,6,14,0.55)", "rgba(10,16,36,0.55)"];
            const tint = tintRaw.map(c => scaleRgbaAlpha(c, TINT_ALPHA_SCALE));
            const pos  = entry.position || "center";
            const sz   = entry.size || "cover";
            // Multi-layer: muted tint gradient on top of cover image.
            layer.style.background =
              `linear-gradient(135deg, ${tint[0]}, ${tint[1]}), url("${entry.src}") ${pos} / ${sz} no-repeat`;
            layer.style.backgroundColor = "#04060e";
          };
          img.onerror = setPlaceholder;
          img.src = entry.src;
        } else {
          setPlaceholder();
        }
      }

      function rotateBackground() {
        if (bgList.length <= 1) return;
        bgIndex = (bgIndex + 1) % bgList.length;
        const next = bgList[bgIndex];
        applyBgVisuals(bgBack, next);
        gsap.to(bgFront,   { opacity: 0, duration: 1.2, ease: "power2.inOut" });
        gsap.fromTo(bgBack, { opacity: 0 }, { opacity: 1, duration: 1.2, ease: "power2.inOut" });
        const tmp = bgFront; bgFront = bgBack; bgBack = tmp;
      }

      async function loadBackgrounds() {
        if (THEME.bg.mode === "video-muted") {
          // Muted looping background video; audio comes from the theme's single track.
          if (await fileExists(THEME.bg.video)) {
            const v = document.getElementById("bg-video");
            v.style.display = "block";
            v.muted = true;            // no sound — audio comes from the theme track
            v.src = THEME.bg.video;
            const reveal = () => { v.style.opacity = "1"; };
            const tryPlay = () => {
              const p = v.play();
              if (p && p.catch) {
                p.catch(() => {
                  // Autoplay blocked (rare for muted video) — retry on first gesture.
                  const resume = () => { v.play().then(reveal).catch(()=>{}); document.removeEventListener("click", resume); };
                  document.addEventListener("click", resume, { once: true });
                });
              }
            };
            v.addEventListener("canplay", reveal, { once: true });
            tryPlay();
            return; // no rotation, no A/B layers in video mode
          }
          // Fallback: single static art plate, no rotation.
          if (THEME.bg.plate && await fileExists(THEME.bg.plate)) {
            bgList = [{
              id: THEME_ID, game: "", caption: "",
              src: THEME.bg.plate,
              // Transparent per-entry tint so the curated art reads cleanly; the
              // global .bg-tint vignette still applies.
              tint: ["rgba(0,0,0,0)", "rgba(0,0,0,0)"]
            }];
            bgIndex = 0;
            applyBgVisuals(bgFront, bgList[0]);
            bgFront.style.opacity = NO_INTRO ? 1 : 0; // intro brings it up
            return; // no rotation interval in static-plate mode
          }
          // Neither theme asset present — fall through to the normal flow.
        }
        if (THEME.bg.mode === "video-audio") {
          // One local looping video carries both the visuals and the song. Unmuted
          // (unlike video-muted) so the track plays straight from the file.
          if (await fileExists(THEME.bg.video)) {
            const v = document.getElementById("bg-video");
            v.style.display = "block";
            v.loop = true;
            v.muted = false;
            v.volume = VOLUME_OVERRIDE != null ? VOLUME_OVERRIDE : 1;
            v.src = THEME.bg.video;
            // Feed the HUD analyser from the video's audio so it reacts to the song
            // (same as the <audio>-driven modes) instead of running ambient-only.
            setupAudioAnalyser(v);
            const reveal = () => { v.style.opacity = "1"; };
            const tryPlay = () => {
              if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
              const p = v.play();
              if (p && p.catch) {
                p.catch(() => {
                  // Unmuted autoplay blocked in plain browsers (OBS allows it) —
                  // start on the first user gesture instead.
                  const resume = () => {
                    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
                    v.play().then(reveal).catch(()=>{});
                    document.removeEventListener("click", resume);
                  };
                  document.addEventListener("click", resume, { once: true });
                });
              }
            };
            v.addEventListener("canplay", reveal, { once: true });
            tryPlay();
            return; // no rotation, no A/B layers in video-audio mode
          }
          // Theme video missing — fall through to the normal rotating backgrounds.
        }
        try {
          const r = await fetch("themes/vladoms/backgrounds.json", { cache: "no-store" });
          bgList = await r.json();
        } catch (e) {
          console.warn("[bg] No backgrounds.json — using fallback.", e);
          bgList = [{
            id: "fallback", game: "", caption: "",
            src: "assets/background-plate.png",
            tint: ["rgba(4,6,14,0.55)","rgba(10,16,36,0.55)"]
          }];
        }
        // Shuffle so each session starts on a different game.
        for (let i = bgList.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [bgList[i], bgList[j]] = [bgList[j], bgList[i]];
        }
        bgIndex = 0;
        applyBgVisuals(bgFront, bgList[0]);
        bgFront.style.opacity = NO_INTRO ? 1 : 0; // intro brings it up
        if (NO_INTRO) bgFront.style.opacity = 1;
        if (bgList.length > 1) setInterval(rotateBackground, BG_ROTATION_MS);
      }

      // ============================================================
      // Audio playlist (sequential, shuffled, looped)
      // + Web Audio API analyser for live bar reactivity
      // ============================================================
      const audio = document.getElementById("track");
      let playlist = [];
      let trackIdx = 0;
      let analyser = null;
      let freqData = null;
      let audioCtx = null;

      // The element whose audio currently feeds the analyser. Normally the <audio>
      // tag; in version-3 it's the <video> (the song lives in the video file).
      let analyserMedia = null;
      function setupAudioAnalyser(mediaEl) {
        if (audioCtx) return;
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const src = audioCtx.createMediaElementSource(mediaEl);
          analyser = audioCtx.createAnalyser();
          analyser.fftSize = 512;
          // Lower smoothing = snappier, more reactive response to transients.
          analyser.smoothingTimeConstant = 0.62;
          freqData = new Uint8Array(analyser.frequencyBinCount); // 256
          OVERLAY.audio.freqData = freqData;
          src.connect(analyser);
          analyser.connect(audioCtx.destination);
          analyserMedia = mediaEl;
        } catch (e) {
          console.warn("[audio] AudioContext setup failed — bars will run idle.", e);
        }
      }

      function playCurrent() {
        if (!playlist.length) return;
        const t = playlist[trackIdx];
        audio.src = t.src;
        const v = (VOLUME_OVERRIDE != null) ? VOLUME_OVERRIDE : (t.volume != null ? t.volume : 0.7);
        audio.volume = Math.max(0, Math.min(1, v));
        OVERLAY.nowPlaying = (t.artist ? (t.artist + " — " + t.title) : t.title);
        document.getElementById("now-playing").textContent = OVERLAY.nowPlaying;
        const p = audio.play();
        if (p && p.catch) {
          p.catch(err => {
            console.warn("[audio] play() blocked — will retry on user gesture.", err);
            // Common in browsers without user gesture; OBS allows autoplay by default.
            const resume = () => { audio.play().catch(()=>{}); document.removeEventListener("click", resume); };
            document.addEventListener("click", resume, { once: true });
          });
        }
      }

      async function loadPlaylist() {
        // Version 2: loop a single track. Skip if the file is absent.
        if (THEME.track && await fileExists(THEME.track.src)) {
          playlist = [THEME.track];
          trackIdx = 0;
          audio.loop = true; // seamless single-track loop (no "ended" advance needed)
          setupAudioAnalyser(audio);
          playCurrent();
          return;
        }
        try {
          const r = await fetch("themes/vladoms/playlist.json", { cache: "no-store" });
          playlist = await r.json();
        } catch (e) {
          console.warn("[audio] No playlist.json — running silent.", e);
          playlist = [];
        }
        if (!Array.isArray(playlist) || !playlist.length) {
          document.getElementById("now-playing").textContent = "—";
          return;
        }
        // Shuffle
        for (let i = playlist.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [playlist[i], playlist[j]] = [playlist[j], playlist[i]];
        }
        trackIdx = 0;
        OVERLAY.trackIdx = 0;
        OVERLAY.trackCount = playlist.length;
        audio.addEventListener("ended", () => {
          trackIdx = (trackIdx + 1) % playlist.length;
          OVERLAY.trackIdx = trackIdx;
          playCurrent();
        });
        audio.addEventListener("error", (ev) => {
          console.warn("[audio] track error, advancing", ev);
          trackIdx = (trackIdx + 1) % playlist.length;
          OVERLAY.trackIdx = trackIdx;
          setTimeout(playCurrent, 250);
        });
        setupAudioAnalyser(audio);
        playCurrent();
      }

      // ============================================================
      // Per-frame loop — computes FFT bands + envelope detection,
      // drives shared headline glitch, dispatches theme tick hooks.
      // ============================================================
      let bassEnv = 0, midEnv = 0, trebleEnv = 0;
      let holdBass = 0, holdMid = 0, holdTreble = 0;
      const REACT_BASS = 0.85, REACT_MID = 1.25, REACT_TREBLE = 1.85;
      const t0 = performance.now() / 1000;
      function tick(rafNow) {
        const now = performance.now() / 1000;
        const elapsed = now - t0;
        const nowMs = rafNow || performance.now();

        let bass = 0, mid = 0, treble = 0;
        const live = analyser && analyserMedia && !analyserMedia.paused && analyserMedia.currentTime > 0;

        if (live) {
          analyser.getByteFrequencyData(freqData);
          let bs = 0, md = 0, tr = 0;
          for (let i = 1;  i <= 6;   i++) bs += freqData[i] / 255;
          for (let i = 7;  i <= 40;  i++) md += freqData[i] / 255;
          for (let i = 41; i <= 160; i++) tr += freqData[i] / 255;
          bass   = Math.min(1, (bs / 6)   * REACT_BASS);
          mid    = Math.min(1, (md / 34)  * REACT_MID);
          treble = Math.min(1, (tr / 120) * REACT_TREBLE);
        } else {
          bass   = 0.18 + 0.18 * Math.max(0, Math.sin(elapsed * 1.6));
          mid    = 0.18 + 0.08 * Math.sin(elapsed * 1.4 + 0.5);
          treble = 0.20 + 0.06 * Math.sin(elapsed * 2.0 + 1.1);
        }

        bassEnv   = bassEnv   * 0.70 + bass   * 0.30;
        midEnv    = midEnv    * 0.70 + mid    * 0.30;
        trebleEnv = trebleEnv * 0.70 + treble * 0.30;
        const pBass   = Math.max(0, bass   - bassEnv   - 0.015);
        const pMid    = Math.max(0, mid    - midEnv    - 0.015);
        const pTreble = Math.max(0, treble - trebleEnv - 0.012);
        holdBass   = Math.max(holdBass   * 0.42, Math.min(1, pBass   * 14));
        holdMid    = Math.max(holdMid    * 0.50, Math.min(1, pMid    * 13));
        holdTreble = Math.max(holdTreble * 0.32, Math.min(1, pTreble * 16));

        // Shared headline glitch (runs for ALL themes)
        if (holdBass > 0.02) {
          HEADLINE_EL.style.setProperty("--glitch-x", ((Math.random() - 0.5) * holdBass * 32).toFixed(1) + "px");
          HEADLINE_EL.style.setProperty("--glitch-sk", ((Math.random() - 0.5) * holdBass * 3.5).toFixed(2) + "deg");
        } else {
          HEADLINE_EL.style.setProperty("--glitch-x", "0px");
          HEADLINE_EL.style.setProperty("--glitch-sk", "0deg");
        }
        const rgbAmt = Math.max(mid * 0.55, holdMid * 1.1);
        if (rgbAmt > 0.02) {
          const sign = (Math.random() < 0.5 ? -1 : 1);
          const rx = sign * rgbAmt * 14 * (0.5 + Math.random() * 0.6);
          const ry = (Math.random() - 0.5) * rgbAmt * 4;
          HEADLINE_EL.style.setProperty("--rgb-r-x", rx.toFixed(1) + "px");
          HEADLINE_EL.style.setProperty("--rgb-r-y", ry.toFixed(1) + "px");
          HEADLINE_EL.style.setProperty("--rgb-c-x", (-rx * 0.85).toFixed(1) + "px");
          HEADLINE_EL.style.setProperty("--rgb-c-y", (-ry * 0.6).toFixed(1) + "px");
        } else {
          HEADLINE_EL.style.setProperty("--rgb-r-x", "0px");
          HEADLINE_EL.style.setProperty("--rgb-r-y", "0px");
          HEADLINE_EL.style.setProperty("--rgb-c-x", "0px");
          HEADLINE_EL.style.setProperty("--rgb-c-y", "0px");
        }
        const sliceAmt = Math.max(treble * 0.55, holdTreble * 1.1);
        if (sliceAmt > 0.04) {
          const sy = (Math.random() * 0.72 + 0.04) * 100;
          const sh = (Math.random() * 0.20 + 0.04) * 100;
          SLICE_EL.style.setProperty("--slice-y", sy.toFixed(0) + "%");
          SLICE_EL.style.setProperty("--slice-h", sh.toFixed(0) + "%");
          SLICE_EL.style.setProperty("--slice-x", ((Math.random() - 0.5) * sliceAmt * 80).toFixed(1) + "px");
        } else {
          SLICE_EL.style.setProperty("--slice-h", "0%");
        }

        // Theme-specific per-frame hooks (grid, icosahedron, pulses, eq, etc.)
        const td = { nowMs, elapsed, bass, mid, treble, bassEnv, midEnv, trebleEnv, holdBass, holdMid, holdTreble, live };
        for (let i = 0; i < OVERLAY._tick.length; i++) OVERLAY._tick[i](td);

        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
      loadBackgrounds();
      if (THEME.bg.mode === "video-audio") {
        if (THEME.nowPlaying) {
          OVERLAY.nowPlaying = THEME.nowPlaying;
          document.getElementById("now-playing").textContent = THEME.nowPlaying;
        }
      } else {
        loadPlaylist();
      }
    </script>
  </body>
</html>
