<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Vlado_MS — KAIYO//SHARD Overlay</title>
    <!--
      ============================================================
        OBS BROWSER SOURCE — KAIYO//SHARD STARTING SOON OVERLAY
      ============================================================
      Designed for OBS browser source at 1920x1080.

      Query parameters:
        ?q=BE%20RIGHT%20BACK   override headline (auto-shrinks)
        ?bg=15                 background rotation seconds (default 10)
        ?nofx=1                disable scanlines + grain (cleaner look)
        ?volume=0.5            override default volume (0..1)
        ?nointro=0             play the entrance animation (default: skipped)
        ?theme=ID              choose a preset (default "vladoms"):
                               vladoms → "Eve" operator HUD (by @vlado_ms) over the rotating
                                         game backgrounds + shuffled playlist. Auto-connects
                                         to OBS WebSocket (ws://localhost:4455) and fills the
                                         broadcast panel with live SIGNAL/BITRATE/UPTIME/FPS/
                                         CPU/DROP. Opt out ?obs=0; ?obsport=NNNN; ?obspw=SECRET.
                               kaiyo   → original KAIYO//SHARD synthwave HUD over the muted
                                         looping themes/kaiyo/ disco video + single KISSA track.
                               wwm     → Eve HUD recolored to wuxia jade/gold over the looping
                                         themes/wwm/ "Where Winds Meet" video (song from file).
                               (Replaces the old ?style / ?version params.)

      Content lives in:
        playlist.json          songs (sequential, shuffled, looped)
        backgrounds.json       game-themed backgrounds (13 entries)
        assets/backgrounds/    drop your own .jpg/.png per entry id
        assets/songs/          drop song files here

      OBS setup:
        - Add Browser Source → Local file → this index.html
        - Width 1920, Height 1080
        - Tick "Control audio via OBS"
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- ?theme=vladoms ("Eve" operator skin) fonts. Loaded always but only used by the vladoms theme. -->
    <link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Shared base CSS for every theme (structural overlay layers + headline). -->
    <link rel="stylesheet" href="core.css">
    <!-- Theme bootstrap: apply the theme's <html> classes AND load its own CSS file(s)
         before paint, so there's no flash of the wrong skin and the HTML stays light
         (only the active theme's CSS is fetched). Each theme's chrome CSS lives in its
          own folder: themes/<id>/theme.css. Keep __cfg in sync with the THEMES object in
          the main script below. -->
    <script>try{
      var __t=(new URLSearchParams(location.search).get("theme")||"vladoms").toLowerCase();
      var __cfg={
        vladoms:{cls:["hud-eve"],               css:["themes/vladoms/theme.css"],               hud:"themes/vladoms/hud.html", js:["themes/vladoms/theme.js"]},
        kaiyo:  {cls:[],                         css:["themes/kaiyo/theme.css"],                 hud:"themes/kaiyo/hud.html",   js:["themes/kaiyo/theme.js"]},
        wwm:    {cls:["theme-wwm"],              css:["themes/wwm/theme.css"],                   hud:"themes/wwm/hud.html"}
      };
      var __c=__cfg[__t]||__cfg.vladoms;
      __c.cls.forEach(function(k){document.documentElement.classList.add(k);});
      __c.css.forEach(function(href){
        var l=document.createElement("link"); l.rel="stylesheet"; l.href=href;
        document.head.appendChild(l);
      });
    }catch(e){}</script>
    <script src="gsap.min.js"></script>
  </head>
  <body>
    <div id="root" data-composition-id="main">
      <!-- crossorigin intentionally NOT set: needed so file:// audio isn't CORS-tainted for the AnalyserNode. -->
      <audio id="track" preload="auto"></audio>

      <div id="bg-stack">
        <div class="bg-layer" id="bg-A"></div>
        <div class="bg-layer" id="bg-B"></div>
        <!-- version-2 only: muted looping background video (set up in loadBackgrounds) -->
        <video class="bg-video" id="bg-video" muted loop playsinline preload="auto"></video>
      </div>
      <div class="bg-tint"></div>
      <div class="bloom-cyan"    id="bloom-cyan"></div>
      <div class="bloom-magenta" id="bloom-magenta"></div>
      <div class="scanlines"  id="scanlines"></div>
      <div class="grain"      id="grain"></div>

      <!-- Theme HUD loaded dynamically via htmx from themes/<id>/hud.html -->
      <div id="theme-hud"></div>

      <!-- Hidden now-playing (source of truth shared across all themes) -->
      <div id="now-playing" style="display:none">STANDBY</div>

      <div class="center-col">
        <div class="headline-wrap" id="headline-wrap">
          <div class="headline" id="headline"></div>
          <div class="headline-slice" id="headline-slice" aria-hidden="true"></div>
        </div>
      </div>

      <div id="blackout" class="blackout"></div>
    </div>

    <!-- htmx: load theme HUD HTML fragment into #theme-hud -->
    <script>(function(){var c=window.__cfg&&window.__cfg[window.__t];if(c&&c.hud){var e=document.getElementById('theme-hud');e.setAttribute('hx-get',c.hud);e.setAttribute('hx-trigger','load');e.setAttribute('hx-swap','innerHTML');}})();</script>
    <script src="htmx.min.js"></script>
    <script>document.addEventListener('htmx:afterSwap',function(e){if(e.detail.target.id!=='theme-hud')return;var c=window.__cfg&&window.__cfg[window.__t];if(c&&c.js){c.js.forEach(function(u){var s=document.createElement('script');s.src=u;document.body.appendChild(s);});}});</script>

    <script src="js/config.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/backgrounds.js"></script>
    <script src="js/engine.js"></script>
  </body>
</html>
